name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint_and_unit:
    name: Lint & Unit
    uses: ./.github/workflows/rust-lint-unit-reusable.yml

  reliability_guards:
    name: Reliability Guards
    needs: lint_and_unit
    uses: ./.github/workflows/rust-integration-reusable.yml
    with:
      test_command: make reliability-guards

  fuzz_smoke:
    name: Fuzz Smoke Test
    needs: lint_and_unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: arduino/setup-protoc@v3
      - run: cargo install cargo-fuzz
      - run: cargo +nightly fuzz build
      - run: |
          cargo +nightly fuzz run fuzz_proto_decode -- -max_total_time=30
          cargo +nightly fuzz run fuzz_otp -- -max_total_time=30
          cargo +nightly fuzz run fuzz_oprf -- -max_total_time=30
          cargo +nightly fuzz run fuzz_jwt -- -max_total_time=30

  integration:
    name: Integration Tests
    needs: lint_and_unit
    uses: ./.github/workflows/rust-integration-reusable.yml
    with:
      test_command: cargo test --workspace --tests
