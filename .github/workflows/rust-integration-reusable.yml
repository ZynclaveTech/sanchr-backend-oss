name: Rust Integration Reusable

on:
  workflow_call:
    inputs:
      test_command:
        description: Command to run after service/bootstrap setup.
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  run:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sanchr
          POSTGRES_USER: sanchr
          POSTGRES_PASSWORD: sanchr_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      scylla:
        image: scylladb/scylla:5.4
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'describe cluster' || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 60s
        command: --smp 1 --memory 512M --overprovisioned 1 --api-address 0.0.0.0
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
          - 8222:8222
        command: --jetstream --store_dir /data --http_port 8222

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Wait for NATS monitoring endpoint
        run: |
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:8222/healthz >/dev/null; do sleep 2; done'

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-05-10T01-41-38Z \
            server /data --console-address ":9001"

      - name: Wait for MinIO
        run: |
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null; do sleep 2; done'

      - name: Run tests
        run: ${{ inputs.test_command }}
