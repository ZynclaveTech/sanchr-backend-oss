name: Bug Report
description: Report a bug in the Sanchr backend
labels: ["bug"]
body:
  - type: input
    id: crate
    attributes:
      label: Affected Crate
      description: Which crate is affected?
      placeholder: "e.g., sanchr-core, sanchr-server-crypto, sanchr-psi"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "e.g., main@abc1234"
  - type: dropdown
    id: threat_model
    attributes:
      label: Threat Model Impact
      description: Does this bug affect security?
      options:
        - "No security impact"
        - "May affect security (needs review)"
        - "Security vulnerability (use SECURITY.md instead)"
