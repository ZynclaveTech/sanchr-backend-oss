{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sanchr.fullname" . }}-core
  labels:
    {{- include "sanchr.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  podSelector:
    matchLabels:
      {{- include "sanchr.core.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.core.service.grpcPort }}
        - protocol: TCP
          port: {{ .Values.core.service.httpPort }}
---
{{- if .Values.call.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sanchr.fullname" . }}-call
  labels:
    {{- include "sanchr.labels" . | nindent 4 }}
    app.kubernetes.io/component: call
spec:
  podSelector:
    matchLabels:
      {{- include "sanchr.call.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.call.service.grpcPort }}
{{- end }}
{{- end }}
