{{- if .Values.call.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sanchr.fullname" . }}-call
  labels:
    {{- include "sanchr.labels" . | nindent 4 }}
    app.kubernetes.io/component: call
spec:
  replicas: {{ .Values.call.replicas }}
  selector:
    matchLabels:
      {{- include "sanchr.call.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.call.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "sanchr.call.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sanchr.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: sanchr-call
          image: "{{ .Values.call.image.repository }}:{{ .Values.call.image.tag }}"
          imagePullPolicy: {{ .Values.call.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.call.service.grpcPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sanchr.fullname" . }}
          env:
            # --- Secrets: Auth (call service needs JWT validation) ---
            {{- if .Values.existingSecrets.auth }}
            - name: SANCHR__AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.auth }}
                  key: jwt_secret
            {{- end }}
            # --- Secrets: TURN credentials ---
            {{- if .Values.existingSecrets.calling }}
            - name: SANCHR__CALLING__TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.calling }}
                  key: turn_secret
            {{- end }}
            # --- Secrets: NATS password ---
            {{- if .Values.config.database.nats.password }}
            - name: SANCHR__DATABASE__NATS__PASSWORD
              value: {{ .Values.config.database.nats.password | quote }}
            {{- end }}
          livenessProbe:
            grpc:
              port: {{ .Values.call.service.grpcPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: {{ .Values.call.service.grpcPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.call.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- with .Values.call.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.call.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.call.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
