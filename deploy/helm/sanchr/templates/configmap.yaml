apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sanchr.fullname" . }}
  labels:
    {{- include "sanchr.labels" . | nindent 4 }}
data:
  # Auth
  SANCHR__AUTH__DEV_MODE: {{ .Values.config.auth.devMode | quote }}
  SANCHR__AUTH__ACCESS_TOKEN_TTL: {{ printf "%d" (int64 .Values.config.auth.accessTokenTtl) | quote }}
  SANCHR__AUTH__REFRESH_TOKEN_TTL: {{ printf "%d" (int64 .Values.config.auth.refreshTokenTtl) | quote }}
  SANCHR__AUTH__OTP_TTL: {{ printf "%d" (int64 .Values.config.auth.otpTtl) | quote }}
  # Postgres
  SANCHR__DATABASE__POSTGRES__URL: {{ .Values.config.database.postgres.url | quote }}
  SANCHR__DATABASE__POSTGRES__MAX_CONNECTIONS: {{ .Values.config.database.postgres.maxConnections | quote }}
  SANCHR__DATABASE__POSTGRES__MIN_CONNECTIONS: {{ .Values.config.database.postgres.minConnections | quote }}
  # Redis
  SANCHR__DATABASE__REDIS__URL: {{ .Values.config.database.redis.url | quote }}
  SANCHR__DATABASE__REDIS__POOL_SIZE: {{ .Values.config.database.redis.poolSize | quote }}
  # ScyllaDB
  SANCHR__DATABASE__SCYLLA__NODES: {{ .Values.config.database.scylla.nodes | quote }}
  SANCHR__DATABASE__SCYLLA__KEYSPACE: {{ .Values.config.database.scylla.keyspace | quote }}
  SANCHR__DATABASE__SCYLLA__REPLICATION_FACTOR: {{ .Values.config.database.scylla.replicationFactor | quote }}
  # NATS
  SANCHR__DATABASE__NATS__URL: {{ .Values.config.database.nats.url | quote }}
  SANCHR__DATABASE__NATS__USERNAME: {{ .Values.config.database.nats.username | quote }}
  # Storage
  SANCHR__STORAGE__ENDPOINT: {{ .Values.config.storage.endpoint | quote }}
  SANCHR__STORAGE__BUCKET: {{ .Values.config.storage.bucket | quote }}
  SANCHR__STORAGE__REGION: {{ .Values.config.storage.region | quote }}
  # EKF
  SANCHR__EKF__ENABLED: {{ .Values.config.ekf.enabled | quote }}
  SANCHR__EKF__TICK_INTERVAL_SECS: {{ .Values.config.ekf.tickIntervalSecs | quote }}
  SANCHR__EKF__ROTATION_GRACE_SECS: {{ .Values.config.ekf.rotationGraceSecs | quote }}
