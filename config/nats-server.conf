# ── NATS Server Configuration ────────────────────────────────────────
# Used by the docker-compose nats service.

# ── JetStream ────────────────────────────────────────────────────────
jetstream {
  store_dir: /data
}

# ── HTTP Monitoring ──────────────────────────────────────────────────
http_port: 8222

# ── Authorization ────────────────────────────────────────────────────
authorization {
  user: sanchr
  password: $NATS_PASSWORD
}

