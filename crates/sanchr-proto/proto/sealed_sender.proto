syntax = "proto3";
package sanchr.sealed_sender;

message ServerCertificate {
  message Certificate {
    uint32 id = 1;
    bytes key = 2;
  }
  bytes certificate = 1;
  bytes signature = 2;
}

message SenderCertificate {
  message Certificate {
    // Field 1 reserved for libsignal's deprecated `sender` (E164) string.
    reserved 1;
    reserved "sender";
    uint32 sender_device = 2;
    fixed64 expires = 3;
    bytes identity_key = 4;
    ServerCertificate signer = 5;
    string sender_uuid = 6;
  }
  bytes certificate = 1;
  bytes signature = 2;
}
