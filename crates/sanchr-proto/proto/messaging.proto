syntax = "proto3";
package sanchr.messaging;

service MessagingService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc StartDirectConversation(StartDirectConversationRequest) returns (Conversation);
  rpc MessageStream(stream ClientEvent) returns (stream ServerEvent);
  rpc SyncMessages(SyncRequest) returns (stream EncryptedEnvelope);
  rpc AckMessages(AckMessagesRequest) returns (AckMessagesResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc SendReceipt(ReceiptRequest) returns (ReceiptResponse);
  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse);
  rpc SendReaction(Reaction) returns (Reaction);
  rpc GetSenderCertificate(SenderCertificateRequest) returns (SenderCertificateResponse);
  rpc GetDeliveryTokens(DeliveryTokenRequest) returns (DeliveryTokenResponse);
  rpc SendSealedMessage(SendSealedMessageRequest) returns (SendSealedMessageResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
}

message StartDirectConversationRequest {
  string recipient_id = 1;
}

message DeviceMessage {
  string recipient_id = 1;
  int32 device_id = 2;
  bytes ciphertext = 3;
}

message SendMessageRequest {
  string conversation_id = 1;
  repeated DeviceMessage device_messages = 2;
  string content_type = 3;
  int64 expires_after_secs = 4;
}

message SendMessageResponse {
  string message_id = 1;
  int64 server_timestamp = 2;
}

message ClientEvent {
  oneof event {
    TypingIndicator typing = 1;
    // field 2 reserved — formerly ReceiptRequest (removed: sealed receipts)
    // field 3 reserved — formerly PresenceHeartbeat (removed: P2P presence)
    CallEventAck call_event_ack = 4;
  }
}

message ServerEvent {
  oneof event {
    EncryptedEnvelope message = 1;
    TypingIndicator typing = 2;
    ReceiptUpdate receipt = 3;
    // field 4 reserved — formerly PresenceUpdate (removed: P2P presence)
    PreKeyCountLow pre_key_count_low = 5;
    CallOfferEvent call_offer = 6;
    CallLifecycleEvent call_lifecycle = 7;
    Reaction reaction = 8;
    SealedInboundMessage sealed_message = 9;
    MessageEdited message_edited = 10;
  }
}

message CallOfferEvent {
  string call_id = 1;
  string caller_id = 2;
  string call_type = 3;
  bytes sdp_offer = 4;
  bytes srtp_key_params = 5;
  bytes encrypted_sdp_payload = 6;  // Signal-encrypt(SealedCallPayload JSON)
}

message CallLifecycleEvent {
  string call_id = 1;
  string peer_id = 2;
  string event_type = 3;
  string actor_id = 4;
}

message CallEventAck {
  string call_id = 1;
  string kind = 2; // "offer" or "lifecycle"
}

message EncryptedEnvelope {
  string conversation_id = 1;
  string message_id = 2;
  string sender_id = 3;
  int32 sender_device = 4;
  bytes ciphertext = 5;
  string content_type = 6;
  int64 server_timestamp = 7;
}

message TypingIndicator {
  string conversation_id = 1;
  string user_id = 2;
  bool is_typing = 3;
}

message ReceiptRequest {
  string conversation_id = 1;
  string message_id = 2;
  string status = 3;
}

message ReceiptResponse {}

message ReceiptUpdate {
  string conversation_id = 1;
  string message_id = 2;
  string recipient_id = 3;
  string status = 4;
  int64 timestamp = 5;
}

enum PresenceStatus {
  PRESENCE_STATUS_UNSPECIFIED = 0;
  ONLINE = 1;
  OFFLINE = 2;
  HIDDEN = 3;
}

enum DevicePresenceState {
  DEVICE_STATE_UNSPECIFIED = 0;
  FOREGROUND = 1;
  BACKGROUND = 2;
  OFFLINE_DEVICE = 3;
}

message PresenceHeartbeat {
  DevicePresenceState device_state = 1;
  int64 sent_at_ms = 2;
}

message PresenceUpdate {
  string user_id = 1;
  string status = 2;
  int64 last_seen = 3;
  PresenceStatus status_code = 4;
}

message PreKeyCountLow {
  int32 device_id = 1;
  int32 remaining_count = 2;
}

message SyncRequest {
  int64 since_timestamp = 1;
}

message AckedMessageRef {
  string conversation_id = 1;
  string message_id = 2;
}

message AckMessagesRequest {
  repeated AckedMessageRef messages = 1;
}

message AckMessagesResponse {}

message DeleteMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
}

message DeleteMessageResponse {}

message EditMessageRequest {
  string conversation_id = 1;
  string message_id = 2;
  // Re-encrypted ciphertext for each recipient device.  Same semantics as
  // SendMessageRequest.device_messages — one entry per target device.
  repeated DeviceMessage device_messages = 3;
}

message EditMessageResponse {
  // Milliseconds since Unix epoch when the edit was recorded server-side.
  int64 edited_at = 1;
}

// Broadcast to all conversation participants (except the editor) when a
// message is edited.  Each recipient gets the ciphertext encrypted for their
// specific device.
message MessageEdited {
  string conversation_id = 1;
  string message_id = 2;
  string sender_id = 3;
  // Per-device ciphertext — each ServerEvent carrying this message targets a
  // single device and contains that device's ciphertext.
  bytes ciphertext = 4;
  int64 edited_at = 5;
}

message GetConversationsRequest {}

message GetConversationsResponse {
  repeated Conversation conversations = 1;
}

message Conversation {
  string id = 1;
  string type = 2;
  repeated string participant_ids = 3;
  int32 unread_count = 4;
  repeated Participant participants = 5;
}

message Participant {
  string user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
}

message Reaction {
  string message_id = 1;
  string conversation_id = 2;
  string user_id = 3;
  string emoji = 4;
  bool removed = 5;
  int64 timestamp = 6;
}

message SenderCertificateRequest {}

message SenderCertificateResponse {
  bytes certificate = 1;
  int64 expiration = 2;
}

message DeliveryTokenRequest {
  int32 count = 1;
}

message DeliveryTokenResponse {
  repeated bytes tokens = 1;
}

message SendSealedMessageRequest {
  bytes delivery_token = 1;
  repeated SealedDeviceMessage device_messages = 2;
}

message SealedDeviceMessage {
  string recipient_id = 1;
  int32 device_id = 2;
  bytes sealed_envelope = 3;
  // Optional cleartext routing metadata. It lets the server honor
  // per-device conversation notification mutes before sending silent APNs,
  // while the sealed envelope remains opaque.
  string conversation_id = 4;
}

message SendSealedMessageResponse {
  int64 server_timestamp = 1;
}

message SealedInboundMessage {
  bytes sealed_envelope = 1;
  int64 server_timestamp = 2;
  string message_id = 3;
}

message DeleteConversationRequest {
  string conversation_id = 1;
}

message DeleteConversationResponse {
  bool success = 1;
}
