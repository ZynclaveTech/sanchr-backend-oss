syntax = "proto3";
package sanchr.backup_payload;

message BackupInfo {
  int32 format_version = 1;
  int64 exported_at_ms = 2;
  string platform = 3;
  string app_version = 4;
  int64 contact_count = 5;
  int64 conversation_count = 6;
  int64 message_count = 7;
  int64 vault_item_count = 8;
}

message BackupMediaPayload {
  string url = 1;
  string thumbnail_url = 2;
  bytes encryption_key = 3;
  bytes encryption_iv = 4;
  string mime_type = 5;
  int64 size_bytes = 6;
  string caption = 7;
  int32 width = 8;
  int32 height = 9;
  int64 duration_ms = 10;
  string file_name = 11;
}

message BackupLocationPayload {
  double latitude = 1;
  double longitude = 2;
  string label = 3;
}

message BackupContactPayload {
  string name = 1;
  string phone_number = 2;
}

message BackupContactRecord {
  string id = 1;
  string user_id = 2;
  string phone_number = 3;
  string display_name = 4;
  string avatar_url = 5;
  string bio = 6;
  bool is_verified = 7;
  int64 last_seen_ms = 8;
  string status = 9;
  bool is_local_user = 10;
  bool is_registered = 11;
  bool is_blocked = 12;
  bool is_favorite = 13;
  int64 last_synced_at_ms = 14;
}

message BackupConversationRecord {
  string id = 1;
  string type = 2;
  string title = 3;
  string avatar_url = 4;
  repeated string participant_ids = 5;
  string last_message_id = 6;
  string last_message_preview = 7;
  int64 last_message_timestamp_ms = 8;
  string last_message_sender_id = 9;
  string last_message_status = 10;
  string last_message_content_type = 11;
  string last_message_content_body = 12;
  int32 unread_count = 13;
  bool is_pinned = 14;
  bool is_muted = 15;
  bool is_archived = 16;
  int64 disappearing_duration_ms = 17;
  int64 created_at_ms = 18;
  int64 updated_at_ms = 19;
}

message BackupMessageRecord {
  string id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  int64 timestamp_ms = 4;
  string content_type = 5;
  string content_body = 6;
  string preview_text = 7;
  string status = 8;
  bool is_outgoing = 9;
  string reply_to_message_id = 10;
  int64 expires_at_ms = 11;
  bool is_deleted = 12;
}

message BackupVaultItemRecord {
  string id = 1;
  string name = 2;
  string type = 3;
  int64 size_bytes = 4;
  bytes encryption_key = 5;
  bytes encryption_iv = 6;
  string encrypted_thumbnail_url = 7;
  int64 created_at_ms = 8;
  int64 updated_at_ms = 9;
  bool is_cached_locally = 10;
  string remote_url = 11;
  string local_url = 12;
}

message BackupFrame {
  oneof frame {
    BackupInfo info = 1;
    BackupContactRecord contact = 2;
    BackupConversationRecord conversation = 3;
    BackupMessageRecord message = 4;
    BackupVaultItemRecord vault_item = 5;
  }
}
